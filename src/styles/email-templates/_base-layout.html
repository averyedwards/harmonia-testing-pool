<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <title>{{subject}}</title>
  <style type="text/css">
    /* CSS Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #FAF6F1; }
    div[style*="margin: 16px 0"] { margin: 0 !important; }
    /* Dark mode — gold accent should remain visible */
    @media (prefers-color-scheme: dark) {
      .email-card { background-color: #2D1A1C !important; }
      .email-body-text { color: #C4B8B0 !important; }
      .email-heading { color: #F5F0E8 !important; }
      .email-wrapper { background-color: #12090A !important; }
    }
    @media only screen and (max-width: 620px) {
      .email-container { width: 100% !important; }
      .email-card { padding: 28px 20px !important; }
    }
  </style>
</head>
<!--
  BASE LAYOUT REFERENCE — not sent directly.
  Copy this structure for each transactional template.

  Variables used across all templates:
    {{firstName}}         — recipient first name
    {{unsubscribeUrl}}    — one-click unsubscribe link
    {{subject}}           — email subject line

  Logo: gold circle with "H" (SVG data URI, renders even when images blocked)
  Card: #FFFFFF background, 3px gold (#D4A853) top border, 12px border-radius
  Button: bulletproof table method — bgcolor on <td>, no CSS class on <a>
  Footer: unsubscribe + notification preferences links

  Sending addresses:
    Transactional: testingpool@harmoniaengine.com
    Sales enquiries: sales@harmoniaengine.com
-->
<body style="background-color: #FAF6F1; margin: 0; padding: 0;">

  <!-- Preheader (hidden preview text) -->
  <div style="display:none;font-size:1px;color:#FAF6F1;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    {{preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
  </div>

  <!-- Outer wrapper -->
  <table class="email-wrapper" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#FAF6F1;">
    <tr>
      <td align="center" style="padding:40px 20px;">

        <!-- 600px container -->
        <table class="email-container" border="0" cellpadding="0" cellspacing="0" width="600" style="max-width:600px;width:100%;">

          <!-- Header: logo + wordmark -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <img src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2248%22%20height%3D%2248%22%20viewBox%3D%220%200%2048%2048%22%3E%3Ccircle%20cx%3D%2224%22%20cy%3D%2224%22%20r%3D%2224%22%20fill%3D%22%23D4A853%22%2F%3E%3Ctext%20x%3D%2224%22%20y%3D%2232%22%20font-family%3D%22Georgia%2Cserif%22%20font-size%3D%2224%22%20font-weight%3D%22bold%22%20text-anchor%3D%22middle%22%20fill%3D%22%2312090A%22%3EH%3C%2Ftext%3E%3C%2Fsvg%3E"
                   alt="H" width="48" height="48" style="display:block;margin:0 auto 10px;">
              <span style="font-family:Georgia,'Times New Roman',serif;font-size:18px;font-weight:600;color:#1E293B;letter-spacing:0.1em;text-transform:uppercase;">Harmonia Engine</span>
            </td>
          </tr>

          <!-- Content card -->
          <tr>
            <td class="email-card" style="background-color:#FFFFFF;border-radius:12px;border-top:3px solid #D4A853;padding:40px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">

              <!-- === CONTENT GOES HERE === -->
              {{content}}

            </td>
          </tr>

          <!-- Spacer -->
          <tr><td style="height:24px;">&nbsp;</td></tr>

          <!-- Footer -->
          <tr>
            <td align="center">
              <p style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#9CA3AF;margin:0 0 6px;line-height:1.5;">
                &copy; 2026 Harmonia Engine Ltd. All rights reserved.
              </p>
              <p style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#9CA3AF;margin:0;line-height:1.5;">
                <a href="{{unsubscribeUrl}}" style="color:#9CA3AF;text-decoration:underline;">Unsubscribe</a>
                &nbsp;&middot;&nbsp;
                <a href="https://app.harmoniaengine.com/settings" style="color:#9CA3AF;text-decoration:underline;">Notification preferences</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
