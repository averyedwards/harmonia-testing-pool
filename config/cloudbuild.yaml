steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/harmonia:$COMMIT_SHA'
      - '-f'
      - 'config/Dockerfile'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/harmonia:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/harmonia:$COMMIT_SHA'

  # Tag as latest
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'tag'
      - 'gcr.io/$PROJECT_ID/harmonia:$COMMIT_SHA'
      - 'gcr.io/$PROJECT_ID/harmonia:latest'

  # Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/harmonia:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'harmonia'
      - '--image'
      - 'gcr.io/$PROJECT_ID/harmonia:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'

images:
  - 'gcr.io/$PROJECT_ID/harmonia:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/harmonia:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
